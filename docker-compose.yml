services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123"
    ports: ["1433:1433"]
    volumes: ["mssql-data:/var/opt/mssql"]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build:
      context: .
      dockerfile: src/Presentation/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__Default: "Server=sqlserver,1433;Database=FptConnectDB;User Id=sa;Password=Your_strong_Pass123;TrustServerCertificate=True"
    ports: ["5080:8080"]
    depends_on: [sqlserver, redis]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports: ["5173:8080"]
    depends_on: [api]

volumes:
  mssql-data:
